<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Fashion Parade — Confirm Your Vote | University Event</title>
  <!-- Quiet luxury: Inter font – clean, small, premium -->
   <link rel="stylesheet" href="/css/voting page.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <div class="vote-page">
    <!-- Header Section -->
    <div class="page-header">
      <h1>Confirm Your Vote</h1>
      <div class="sub">Support your favorite contestant</div>
    </div>

    <!-- Selected Contestant Card (dynamic) -->
    <div class="contestant-card" id="contestantCard">
      <div class="vote-message" id="voteMessage">Loading contestant...</div>
    </div>

    <!-- Voting Options Section -->
    <div class="voting-section">
      <div class="section-title">Choose vote package</div>
      <div class="options-grid" id="optionsGrid">
        <!-- Option 1: ₦100 – 1 vote -->
        <div class="vote-option" data-amount="₦100" data-votes="1 vote" data-description="1 vote">
          <div class="vote-amount">₦100</div>
          <div class="vote-desc">1 vote</div>
        </div>
        <!-- Option 2: ₦500 – 5 votes -->
        <div class="vote-option" data-amount="₦500" data-votes="5 votes" data-description="5 votes">
          <div class="vote-amount">₦500</div>
          <div class="vote-desc">5 votes</div>
        </div>
        <!-- Option 3: ₦1000 – bonus (12 votes) -->
        <div class="vote-option" data-amount="₦1000" data-votes="12 votes" data-description="12 votes (bonus)">
          <div class="vote-amount">₦1000</div>
          <div class="vote-desc">12 votes · bonus</div>
        </div>
      </div>

      <!-- Action Button -->
      <button class="proceed-btn" id="proceedBtn">Proceed to Pay</button>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <p>© 2026 University Students Week — Fashion Parade</p>
  </div>
</footer>

<script>
  // Helper: get URL parameter by name
  function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  // --- Voting options selection logic ---
  const options = document.querySelectorAll('.vote-option');
  let selectedOptionData = {
    amount: "₦100",
    voteText: "1 vote",
    fullDescription: "1 vote"
  };

  // Function to highlight selected option and store data
  function setSelectedOption(selectedElement) {
    options.forEach(opt => opt.classList.remove('selected'));
    selectedElement.classList.add('selected');

    const amount = selectedElement.getAttribute('data-amount') || "₦0";
    const voteText = selectedElement.getAttribute('data-votes') || "0 votes";
    const description = selectedElement.getAttribute('data-description') || voteText;

    selectedOptionData = {
      amount: amount,
      voteText: voteText,
      fullDescription: description
    };
  }

  // Add click listeners to each option
  options.forEach(option => {
    option.addEventListener('click', function(e) {
      e.stopPropagation();
      setSelectedOption(this);
    });
  });

  // Set default selection: first option (₦100)
  if (options.length > 0) {
    options[0].classList.add('selected');
    selectedOptionData = {
      amount: options[0].getAttribute('data-amount') || "₦100",
      voteText: options[0].getAttribute('data-votes') || "1 vote",
      fullDescription: options[0].getAttribute('data-description') || "1 vote"
    };
  }

  // --- Proceed to Pay: show alert with contestant name and selected amount ---
  const proceedBtn = document.getElementById('proceedBtn');
  proceedBtn.addEventListener('click', function() {
    // If no contestant selected (invalid URL), show fallback message
    if (!contestantName) {
      alert("No contestant selected. Please go back and choose a contestant.");
      return;
    }

    const amountDisplay = selectedOptionData.amount;
    const voteDetail = selectedOptionData.voteText;
    alert(`You are voting for ${contestantName} with ${amountDisplay} (${voteDetail})`);
  });
</script>
</body>
</html>
