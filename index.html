<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Fashion Parade 2026 | University Students Week</title>
  <!-- Quiet luxury: Inter font - clean, small, premium -->
   <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <!-- Hero Section (left-aligned, calm) -->
  <section class="hero">
    <div class="hero__label">University Students Week</div>
    <h1 class="hero__title">Fashion Parade 2026</h1>
    <p class="hero__subtitle">Vote for your favorite contestant</p>
    <!-- Main button linking to contestants.html (required) -->
    <a href="contextant page.html" class="btn-primary">View Contestants</a>
  </section>

  <!-- Preview Section (optional but clean, 4 contestants) -->
  <section class="preview">
    <div class="preview__header">
      <div class="label">This year’s lineup</div>
    </div>
    <div class="cards-grid">
      <!-- Card 1 -->
      <div class="card">
        <div class="card__image">
          <div class="placeholder-icon">
            <svg width="38" height="38" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

      </div>
      <!-- Card 2 -->

            <span>look 02</span>
          </div>
        </div>
        <div class="card__name">James Park</div>
      </div>
      <!-- Card 3 -->
      <div class="card">

          <div class="placeholder-icon">
            <svg width="38" height="38" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="#9A9A9A" fill-opacity="0.5"/>
            </svg>
            <span>look 03</span>
          </div>
        </div>
        <div class="card__name">Sophia Laurent</div>

            </svg>
            <span>look 04</span>
          </div>
        </div>
        <div class="card__name">Marcus Velez</div>
      </div>
    </div>

</div>
